<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrations Closed - HackVote</title>
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="staggered-entry">
    <div id="toast-container"></div>
    <div class="container" style="max-width: 500px; padding: 100px 20px;">
        <a href="index.html"
            style="color: var(--primary); font-weight: 700; text-decoration: none; display: flex; align-items: center; gap: 8px; margin-bottom: 20px; font-size: 0.9rem;">
            <i class="fas fa-arrow-left"></i> Back to Home
        </a>
        <div class="auth-container card">
            <h2 class="gradient-text"
                style="font-size: 2.2rem; margin-bottom: 8px; text-align: center; font-weight: 900;">Registrations Closed</h2>
            <div style="text-align: center; padding: 40px 20px; background: rgba(244, 63, 94, 0.05); border: 2px dashed #f43f5e; border-radius: 16px;">
                <div style="font-size: 3.5rem; color: #f43f5e; margin-bottom: 20px;">
                    <i class="fas fa-calendar-times"></i>
                </div>
                <h3 style="font-size: 1.5rem; font-weight: 900; color: #1e293b; margin-bottom: 15px;">Deadline Reached</h3>
                <p style="color: var(--text-muted); font-weight: 600; line-height: 1.6; margin-bottom: 0;">
                    Registration for the Hackathon voting portal has officially ended. We are no longer accepting new participant registrations.
                </p>
                <div style="margin-top: 25px; font-size: 0.85rem; background: #fff; padding: 10px; border-radius: 8px; color: #f43f5e; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;">
                    Closed on April 6, 2026
                </div>
            </div>
            <div
                style="margin-top: 30px; text-align: center; padding-top: 20px; border-top: 1px solid var(--border-color);">
                <p style="font-size: 0.95rem; color: var(--text-muted);">
                    Already have an account? <a href="login.html"
                        style="color: var(--primary); text-decoration: none; font-weight: 700;">Login</a>
                </p>
            </div>
        </div>
    </div>
    <script src="js/main.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script type="text/javascript">
       (function(){
          emailjs.init("yMyJcQw19j6P_qJO6");
       })();
    </script>
    <script src="js/auth.js"></script>
</body>

</html>
