<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voting Dashboard - Hackathon 2026</title>
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/dashboard_new.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="dashboard-page">
    <div id="toast-container"></div>

    <div class="container" style="max-width: 1400px;">
        <nav class="dashboard-nav">
            <div class="logo gradient-text" style="font-size: 1.6rem; letter-spacing: -0.02em;">HACKVOTE</div>
            <div id="user-info" style="display: flex; align-items: center; gap: 20px; color: var(--text-muted);">
                <div style="background: #f1f5f9; padding: 6px 14px; font-size: 0.85rem; border-radius: 8px; border: 1px solid var(--border-color); color: var(--text-main); font-weight: 600;">
                    PRN: <span id="display-prn" style="color: var(--primary)"></span>
                </div>
                <button id="logout-btn" class="btn btn-outline" style="padding: 8px 18px; font-size: 0.85rem; border-radius: 8px;">Logout</button>
            </div>
        </nav>

        <header style="margin-bottom: 40px; text-align: center; display: flex; flex-direction: column; align-items: center;">
            <!-- Welcome Profile Card -->
            <div class="card staggered-entry" style="width: 100%; max-width: 800px; padding: 30px; border-radius: 20px; display: flex; align-items: center; gap: 25px; margin-bottom: 40px; text-align: left;">
                <div style="width: 60px; height: 60px; background: var(--primary); color: white; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2);">
                    <i class="fas fa-user-graduate"></i>
                </div>
                <div>
                    <h1 id="display-name" style="font-size: 2.2rem; font-weight: 800; color: var(--text-main); margin-bottom: 5px;">Welcome, Student</h1>
                    <div style="display: flex; gap: 15px; font-size: 0.95rem; color: var(--text-muted); font-weight: 600;">
                        <span><i class="fas fa-university" style="margin-right: 5px;"></i> <span id="displayBranch">---</span></span>
                        <span><i class="fas fa-calendar-alt" style="margin-right: 5px;"></i> <span id="displayYear">---</span></span>
                    </div>
                </div>
            </div>

            <h2 class="gradient-text staggered-entry" style="font-size: 2.4rem; margin-bottom: 20px; font-weight: 900; animation-delay: 0.1s;">Hackathon Projects</h2>
            
            <div class="progress-container-card staggered-entry" style="margin-top: 40px; animation-delay: 0.1s;">
                <h3 style="margin-bottom: 12px; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); font-weight: 800;">Voting Progress</h3>
                
                <div class="progress-stats" style="margin-bottom: 8px;">
                    <p id="progress-text" style="color: var(--text-muted); font-size: 0.95rem; font-weight: 600;">You have voted for 0 / 70 teams</p>
                    <div class="progress-percent" id="progress-percent-text">0%</div>
                </div>

                <div class="voting-progress-bar">
                    <div id="progress-indicator" class="progress-fill"></div>
                </div>
            </div>
            
            <div class="staggered-entry" style="display: flex; justify-content: center; animation-delay: 0.2s;">
                <div class="search-wrapper">
                    <i class="fas fa-search"></i>
                    <input type="text" id="search-projects" placeholder="Search by team name..." oninput="filterTeams()">
                </div>
            </div>
        </header>

        <main>
            <div id="projectsContainer" class="projects-grid">
                <!-- Project cards will be injected here by dashboard.js -->
                <div class="loader-container">
                    <div class="complex-loader"></div>
                    <p style="color: var(--text-muted); font-weight: 600;">Discovering innovative projects...</p>
                </div>
            </div>
        </main>
    </div>

    <script src="js/main.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
